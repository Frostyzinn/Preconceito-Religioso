<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Post | Respeito Sagrado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Prata&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .upload-area { border: 2px dashed rgba(7, 59, 58, 0.3); background: rgba(7, 59, 58, 0.02); padding: 50px 20px; text-align: center; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); margin-bottom: 20px; }
        .upload-area:hover { border-color: var(--accent-gold); background: rgba(198, 156, 109, 0.05); }
        .upload-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
        .post-textarea { width: 100%; height: 150px; border: 1px solid rgba(0,0,0,0.05); background: var(--bg-color); border-radius: var(--radius-sm); padding: 20px; font-family: var(--font-body); font-size: 1rem; color: var(--text-main); outline: none; resize: none; margin-bottom: 20px; transition: var(--transition); }
        .post-textarea:focus { border-color: var(--accent-gold); box-shadow: var(--shadow-sm); }
        .btn-publish { width: 100%; background: var(--primary-dark); color: var(--white); border: none; padding: 18px; border-radius: var(--radius-pill); font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
        .btn-publish:hover { background: var(--accent-gold); color: var(--primary-dark); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    </style>
</head>
<body>

<header class="main-header">
    <div class="header-content">
        <h1 class="logo">Respeito<span class="thin">Sagrado</span></h1>
    </div>
</header>

<main class="feed-container">
    <div class="post post-text">
        <span class="category">Criar Conteúdo</span>
        <h2 class="post-title">Compartilhe seu Axé</h2>
        
        <label class="upload-area" for="imageInput">
            <span class="upload-icon">📸</span>
            <p style="color: var(--text-sub); font-weight: 500;">Toque para selecionar uma foto ou vídeo</p>
            <input type="file" id="imageInput" style="display: none;">
        </label>
        
        <textarea class="post-textarea" id="caption" placeholder="Escreva uma reflexão sobre a importância de combater o racismo religioso e defender o sagrado..."></textarea>
        
        <button id="postBtn" class="btn-publish">Publicar Agora</button>
    </div>
</main>

<nav class="floating-nav">
    <div class="nav-content">
        <a href="index.html" class="nav-link" title="Início">🏠</a>
        <a href="explore.html" class="nav-link" title="Explorar">🔍</a>
        <a href="post.html" class="nav-link nav-link-center active" title="Novo Post"><span class="plus-icon">➕</span></a>
        <a href="notifications.html" class="nav-link" title="Notificações">❤️</a>
        <a href="perfil.html" class="nav-link" title="Perfil">👤</a>
    </div>
</nav>

</body>
</html>
